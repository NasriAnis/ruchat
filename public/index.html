<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuChat</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .landing {
            color: white;
        }
        .landing h1 {
            font-size: 3rem;
            margin: 0 0 10px;
        }
        .landing p {
            font-size: 1.1rem;
            margin: 0 0 30px;
            opacity: 0.85;
        }
        .go-btn {
            padding: 14px 32px;
            font-size: 18px;
            background-color: white;
            color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
        }
        .go-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="landing">
        <h1>RuChat</h1>
        <p>Real-time chat, powered by Rust.</p>
        <button class="go-btn" onclick="redirect_chat()">Go to chats</button>
        <button class="go-btn" onclick="redirect_login()">Go to login</button>
        <button class="go-btn" onclick="redirect_register()">Go to register</button>
    </div>
    <script src="/js/index.js"> </script>
</body>
</html>
