<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Register</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: serif;
    }
    .register-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    form {
        display: grid;
        grid-template-columns: auto 300px;
        gap: 10px;
        align-items: center;
    }
    label {
        font-size: 16px;
    }
    input[type="text"],
    input[type="password"] {
        height: 24px;
        border: 1px solid #999;
        padding: 2px 6px;
        font-size: 14px;
    }
    button {
        grid-column: 1;
        width: fit-content;
        padding: 6px 20px;
        background: #d4d4d4;
        border: 1px solid #999;
        cursor: pointer;
        font-size: 14px;
    }
    button:hover {
        background: #c4c4c4;
    }
    #statusMsg {
        display: none;
        font-size: 14px;
        font-weight: bold;
        align-self: center;
    }
    #statusMsg.success {
        display: block;
        color: #3fa9f5;
    }
    #statusMsg.error {
        display: block;
        color: #dc3545;
    }
</style>
</head>
<body>
    <div class="register-wrapper">
        <form id="register-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password">
          <button type="submit">Register</button>
          <span id="statusMsg"></span>
        </form>
    </div>
    <script src="/js/register.js"></script>
</body>
</html>
