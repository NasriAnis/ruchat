<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: serif;
    }

    form {
        display: grid;
        grid-template-columns: auto 300px;
        gap: 10px;
        align-items: center;
    }

    label {
        font-size: 16px;
    }

    input[type="username"],
    input[type="password"] {
        height: 24px;
        border: 1px solid #999;
        padding: 2px 6px;
        font-size: 14px;
    }

    button {
        grid-column: 1;
        width: fit-content;
        padding: 6px 20px;
        background: #d4d4d4;
        border: 1px solid #999;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background: #c4c4c4;
    }
</style>
</head>
<body>
    <form id="login form">
      <label for="username">Username:</label>
      <input type="username" id="username" name="username">

      <label for="password">Password:</label>
      <input type="password" id="password" name="password">

      <button type="submit">Login</button>
    </form>
</body>
</html>

<script src="/js/login.js"> </script>
